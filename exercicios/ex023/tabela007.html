<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="pt-br">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Sobre Tabelas</title>

    <style>
        table{
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
        }

        td, th{
            border: 1px solid black;
            padding: 8px;
        }

        th{
            background-color: rgb(135, 134, 134);
        }

        tr:nth-child(even){
            background-color: #cacaca;
        }
    </style>
</head>
<body>
    
    <table border="1">

        <colgroup>
            <col style="background-color: lightgreen;">
            <col style="background-color: lightyellow;">
            <col style="background-color: lightblue;">
            <col style="background-color: lightpink;">
        </colgroup>

        <tr>
            <th>Produto</th>
            <th>Preço</th>
            <th>Unidade</th>
            <th>Quantidade</th>
        </tr>

        <tr>
                <td>Cimento</td>
                <td> R$ 2,50</td>
                <td>UND</td>
                <td>10 UND</td>
        </tr>

        <tr>
            <td>Areia</td>
            <td>R$ 20,00</td>
            <td>Saco</td>
            <td>10 UND</td>
        </tr>

        <tr>
            <td>Porta</td>
            <td>R$ 50,00</td>
            <td>UND</td>
            <td>10 UND</td>
        </tr>

        <tr>
            <td>Furadeira</td>
            <td>R$ 70,00</td>
            <td>UND</td>
            <td>10 UND</td>
        </tr>
    </table>
</body>
</html>
