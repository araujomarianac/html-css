<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabela</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 500px;
            border-collapse: collapse;
        }

        caption{
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }
        
        th, td{
            border: 1px solid black;
            padding: 8px;
        }

        .cnome{
            background-color: chartreuse;
        }

        .cgrupo{
            background-color: yellow;
        }

        .cprof{
            background-color: pink;
        }

    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>
    <table>
        <caption>Cadastro</caption>
        <colgroup>
            <col class="cnome">
            <col class="cgrupo" span="2">
            <col class="cprof">

        </colgroup>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="Idade">Idade</th>
            <th scope="col">Profissão</th>
        </tr>

        <tr>
            <td>Mariana</td>
            <td>F</td>
            <td>25</td>
            <td>Analista de TI</td>
        </tr>

        <tr>
            <td>Lisley</td>
            <td>F</td>
            <td>48</td>
            <td>Tec. Radiologia</td>
        </tr>

         <tr>
            <td>Naldo</td>
            <td>M</td>
            <td>48</td>
            <td>Bombeiro</td>
        </tr>

         <tr>
            <td>Cirlene</td>
            <td>F</td>
            <td>51</td>
            <td>Professora</td>
        </tr>

         <tr>
            <td>Teodora</td>
            <td>F</td>
            <td>59</td>
            <td>Tec. Enfermagem</td>
        </tr>

         <tr>
            <td>Leanndra</td>
            <td>F</td>
            <td>25</td>
            <td>Professora</td>
        </tr>
    </table>
    
</body>
</html>
