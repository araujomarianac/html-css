<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Sobre Tabelas</title>

    <style>
        table{
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
        }

        th,td{
            border: 1px solid black;
            padding: 8px;
        }

        tbody tr:nth-child(even) td{
            background-color: rgba(0, 0, 0, 0.141);
        }
    </style>
</head>
<body>
    <table>

        <colgroup>
            <col style="background-color:green ;">
            <col style="background-color:yellow;">
            <col>
            <col style="background-color:red;">
        </colgroup>

        <thead>

            <caption>Cardápio</caption>
            <tr>
                <th>Prato</th>
                <th>Valor</th>
                <th>Quant. Pessoas</th>
                <th>Acompanhamentos</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Macarronada</td>
                <td>R$ 20,00</td>
                <td>2 Pessoas</td>
                <td>Batata Frita</td>
            </tr>

            <tr>
                <td>Lasanha</td>
                <td>R$ 30,00</td>
                <td>3 pessoas</td>
                <td>Refrigerante</td>
            </tr>

            <tr>
                <td>Churrasco</td>
                <td>R$ 50,00</td>
                <td>3 pessoas</td>
                <td> Macaxeira</td>
            </tr>

            <tr>
                <td>Peixe Cozido</td>
                <td>R$ 60,00</td>
                <td>2 pessoas</td>
                <td>Farinha</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
